name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check Python and workflow JSON
        run: |
          python -m py_compile \
            __init__.py \
            install.py \
            nodes.py \
            prestartup_script.py \
            scripts/install_anima_controls.py \
            scripts/download_loras.py \
            tests/test_controls_manifest.py \
            tests/test_install_anima_controls.py \
            tests/test_lora_manifest.py \
            tests/test_prompt_queue.py \
            tests/test_workflow.py
          python -m json.tool config/anima-controls.json
          python -m json.tool config/anima-loras.json
          python - <<'PY'
          import json
          from pathlib import Path

          workflow_dir = Path("example_workflows")
          workflow_names = sorted(path.name for path in workflow_dir.glob("*.json"))
          assert workflow_names == [
              "anima_hiresfix_esrgan_2pass.json",
              "anima_hiresfix_esrgan_pose_depth.json",
              "anima_hiresfix_latent_2pass.json",
          ]

          for path in workflow_dir.glob("*.json"):
              workflow = json.loads(path.read_text(encoding="utf-8"))
              nodes = {node["id"]: node for node in workflow["nodes"]}
              for link_id, source_id, source_slot, target_id, target_slot, _type in (
                  workflow["links"]
              ):
                  assert source_id in nodes, (path, link_id, source_id)
                  assert target_id in nodes, (path, link_id, target_id)
                  assert source_slot < len(nodes[source_id]["outputs"]), (path, link_id)
                  assert target_slot < len(nodes[target_id]["inputs"]), (path, link_id)
              print(
                  f"validated {path.name} with {len(workflow['nodes'])} nodes "
                  f"and {len(workflow['links'])} links"
              )
          PY

      - name: Run unit tests
        run: PYTHONPATH=. python -m unittest discover -s tests -v

      - name: Build source archive
        run: |
          mkdir -p dist
          git archive \
            --format=zip \
            --output="dist/comfyui-anima-variation-batch-${GITHUB_SHA::7}.zip" \
            HEAD

      - name: Upload source archive
        uses: actions/upload-artifact@v7
        with:
          name: comfyui-anima-variation-batch-${{ github.sha }}
          path: dist/*.zip
          if-no-files-found: error
